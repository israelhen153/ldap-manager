name: CI
on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master
jobs:
  ci:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          dnf install -y epel-release
          dnf install -y python3 python3-pip python3-devel \
            openldap-devel cyrus-sasl-devel gcc make
      - name: Install package
        run: pip3 install -e ".[dev]" --break-system-packages
      - name: Lint
        run: make lint
      - name: Type check
        run: make typecheck
      - name: Security scan
        run: make security
      - name: Tests
        run: pytest
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 14
