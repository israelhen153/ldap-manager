name: CI
on:
  push:
    branches: [master, develop]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          dnf install -y epel-release
          dnf install -y python3.11 python3.11-pip python3.11-devel \
            openldap-devel cyrus-sasl-devel gcc make

      - name: Install package
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install -e ".[dev]"

      - name: Lint
        run: |
          make lint-fix
          make lint

      - name: Type check
        run: make typecheck

      - name: Security scan
        run: make security

      - name: Tests
        run: pytest

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 14

  build-rpm:
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    container:
      image: rockylinux:8
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          dnf install -y epel-release
          dnf install -y python3.11 python3.11-pip python3.11-devel \
            openldap-devel cyrus-sasl-devel gcc rpm-build

      - name: Build sdist
        run: |
          pip3 install --upgrade pip setuptools wheel build
          python3 -m build --sdist

      - name: Build RPM
        run: |
          VERSION=$(python3 -c "
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp dist/*.tar.gz ~/rpmbuild/SOURCES/

          cat > ~/rpmbuild/SPECS/ldap-manager.spec << 'SPEC'
          Name:           ldap-manager
          Version:        %{_version}
          Release:        1%{?dist}
          Summary:        CLI power tools for OpenLDAP administration
          License:        MIT
          URL:            https://github.com/israelhen153/ldap-manager
          Source0:        ldap_manager-%{version}.tar.gz
          BuildArch:      noarch
          BuildRequires:  python3-devel python3-setuptools
          Requires:       python3-ldap python3-pyyaml python3-click python3-passlib
          Requires:       openldap-clients openldap-servers

          %description
          CLI power tools for sysadmins who run OpenLDAP and refuse to touch a web UI.

          %prep
          %setup -n ldap-manager-%{version} || %setup -n ldap-manager-%{version}

          %build
          %py3_build

          %install
          %py3_install

          %files
          %license LICENSE
          %doc README.md
          %{python3_sitelib}/ldap_manager/
          %{python3_sitelib}/ldap_manager-*.egg-info/
          %{_bindir}/ldap-manager
          SPEC

          sed -i "s/%{_version}/${VERSION}/" ~/rpmbuild/SPECS/ldap-manager.spec
          rpmbuild -ba ~/rpmbuild/SPECS/ldap-manager.spec

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: ~/rpmbuild/RPMS/noarch/*.rpm
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: [ci, build-rpm]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: rpm-package
          path: rpms/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: rpms/*.rpm
          generate_release_notes: true
